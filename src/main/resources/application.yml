chat-machinist:
  visualize: true
  persistence:
    type: mongodb
  bot:
    name: moneyManagerAIbot
    token: ${BOT_TOKEN}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash

telegram:
  file:
    max-voice-duration-seconds: 180 # 3 минуты
    max-file-size-bytes: 2097152 # 2 MB (2 * 1024 * 1024)
    api-url: "https://api.telegram.org/file/bot"

debug: false

logging:
  level:
    root: INFO
    ai.moneymanager: DEBUG

spring:
  mongodb:
    database: moneyManagerBot
    host: ${MONGO_HOST:localhost}
    username: ${MONGO_USERNAME}
    password: ${MONGO_PASSWORD}
    port: 27019
  data:
    mongodb:
      auto-index-creation: true
  main:
    banner-mode: off